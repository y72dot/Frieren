# NapCatQQ + QQ Bot (dev & deploy)
#
# Quick start:
#   1. docker compose up -d napcat
#   2. docker compose logs napcat      # wait for QR code
#   3. Scan QR, login with QQ mobile
#   4. docker compose up -d qqbot
#   5. docker compose logs qqbot       # verify: "2 plugin(s) loaded"
#
services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: unless-stopped
    environment:
      - ACCOUNT=${NAPCT_QQ:-3632757457}
      - MODE=ws                        # ws.json: WS server on :3001
      - NAPCAT_GID=${NAPCT_GID:-0}
      - NAPCAT_UID=${NAPCT_UID:-0}
    ports:
      - "3001:3001"   # WebSocket for bot
      - "6099:6099"   # WebUI
    volumes:
      - ./data/napcat/QQ:/app/.config/QQ        # QQ login session
      - ./data/napcat/config:/app/napcat/config  # napcat onebot config
    networks:
      - bot-network

  qqbot:
    build: .
    container_name: qqbot
    restart: unless-stopped
    depends_on:
      - napcat
    environment:
      - NAPCAT_WS_URL=ws://napcat:3001
      - NAPCAT_TOKEN=${NAPCT_WS_TOKEN:-}
    volumes:
      # Mount source for live dev (remove for production deploy)
      - ./src:/app/src:ro
      - ./plugins:/app/plugins:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
