# Single QQ Bot deployment with NapCatQQ.
#
# Quick start:
#   1. Configure instances/frieren/bot.toml
#   2. docker compose up -d napcat-frieren
#   3. docker compose logs napcat-frieren    # get WebUI URL + token for QR login
#   4. SSH tunnel: ssh -L 6099:127.0.0.1:6099 user@host, open http://localhost:6099
#   5. docker compose up -d qqbot-frieren
#   6. docker compose logs -f qqbot-frieren  # verify connection
#
services:
  # ------------------------------------------------------------------
  # Frieren (QQ: 3632757457)
  # ------------------------------------------------------------------
  napcat-frieren:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat-frieren
    restart: unless-stopped
    environment:
      - ACCOUNT=3632757457
      - MODE=ws
      - NAPCAT_GID=0
      - NAPCAT_UID=0
    ports:
      - "127.0.0.1:3001:3001"   # WebSocket for qqbot
      - "127.0.0.1:6099:6099"   # WebUI
    volumes:
      - ./instances/napcat-frieren/QQ:/app/.config/QQ
      - ./instances/napcat-frieren/config:/app/napcat/config
    networks:
      - bot-network

  qqbot-frieren:
    build:
      context: .
      target: runtime
    container_name: qqbot-frieren
    restart: unless-stopped
    depends_on:
      - napcat-frieren
    working_dir: /config
    environment:
      - BOT_CONFIG_DIR=/config
      - PYTHONPATH=/app
    volumes:
      - ./instances/frieren:/config
      - ./config/prompts:/config/prompts
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "python", "-m", "src.healthcheck", "--config-dir", "/config", "--state", "data/health.json", "--database", "data/messages.db", "--max-age", "90"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  e2e:
    profiles: ["test"]
    build:
      context: .
      target: test
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    command: ["python", "scripts/run_e2e.py", "--levels", "L0,L1,L2,L3,L4,L5"]

  # ------------------------------------------------------------------
  # Sandbox — agent's Linux playground
  # ------------------------------------------------------------------
  sandbox:
    image: python:3.12-slim
    container_name: qqbot-sandbox
    restart: unless-stopped
    command: ["sleep", "infinity"]
    working_dir: /workspace
    environment:
      - HOME=/workspace
      - PIP_NO_CACHE_DIR=1
    volumes:
      - sandbox-workspace:/workspace
    tmpfs:
      - /tmp:exec,size=16m
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    network_mode: none
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64

volumes:
  sandbox-workspace:

networks:
  bot-network:
    driver: bridge
