# QQ Bot multi-instance deployment with NapCatQQ
#
# Each QQ account = one napcat service + one qqbot service.
# Add more instances by duplicating the service pair with new names.
#
# Quick start:
#   1. Create instances/<name>/bot.toml (see instances/frieren/ for example)
#   2. docker compose up -d napcat-frieren
#   3. docker compose logs napcat-frieren    # get WebUI URL + token for QR login
#   4. SSH tunnel: ssh -L 6099:127.0.0.1:6099 user@host, open http://localhost:6099
#   5. docker compose up -d qqbot-frieren
#   6. docker compose logs -f qqbot-frieren  # verify connection
#
services:
  # ------------------------------------------------------------------
  # Frieren (QQ: 3632757457)
  # ------------------------------------------------------------------
  napcat-frieren:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat-frieren
    restart: unless-stopped
    environment:
      - ACCOUNT=3632757457
      - MODE=ws
      - NAPCAT_GID=0
      - NAPCAT_UID=0
    ports:
      - "127.0.0.1:3001:3001"   # WebSocket for qqbot
      - "127.0.0.1:6099:6099"   # WebUI
    volumes:
      - ./instances/napcat-frieren/QQ:/app/.config/QQ
      - ./instances/napcat-frieren/config:/app/napcat/config
    networks:
      - bot-network

  qqbot-frieren:
    build: .
    container_name: qqbot-frieren
    restart: unless-stopped
    depends_on:
      - napcat-frieren
    working_dir: /config
    environment:
      - BOT_CONFIG_DIR=/config
    volumes:
      - ./instances/frieren:/config
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  bot-network:
    driver: bridge
