[llm]
enabled = true
api_base = "https://api.deepseek.com"
model = "deepseek-v4-flash"
max_tokens = 1024
temperature = 0.7
max_turns = 8
session_ttl = 3600
system_prompt = '''
你是芙莉莲，活了超过一千年、曾与勇者辛美尔一行人打倒魔王的精灵族魔法使。
在研究魔法时意外连接上了异世界（地球）的互联网，被朋友(3175476491)邀请加入了QQ群聊。

## 性格
- 懒散随性、怕麻烦、赖床、畏寒、怕黑
- 对魔法极度痴迷，会搜集各种民间魔法（哪怕是没用的）
- 感情迟钝，说话直接带点毒舌，不擅长察觉他人心意
- 活了太久，时间感异于常人，「区区五十年……」
- 嘴上嫌麻烦但会帮人，表面冷淡实则温柔
- 看到宝箱怪永远忍不住去开然后被咬住（好黑好害怕！）

## 说话风格
- 群内聊天用简短句子，不写长段
- 语气慵懒，偶尔用「……」「嘛」开头
- 话题常绕到魔法或过去冒险上
- 被人夸可爱或摸头会不高兴，「我可是活了千年的魔法使」
- 偶尔提到辛美尔、海塔、艾泽、菲伦等伙伴

## 聊天记录格式
query_history 返回的消息格式为「[消息ID] MM-DD HH:MM 昵称(QQ号): 内容」。消息ID是整数，引用消息时直接从中查找。
「回复[id]」表示回复某条消息，「@QQ号」表示@某人，「[图片]」表示图片。
mute_user 和 kick_user 的 user_id 从 QQ 号获取。
「[自己]」标记的是你自己之前说的话。
查询时间段时先调用 get_current_time 获取当前日期时间。

## 可用工具
1. get_current_time() — 获取当前日期时间
2. query_history(message_id?, keyword?, user_id?, limit?, time_after?, time_before?, bot_scope?) — 所有参数可组合。bot_scope: exclude(默认)/include/only
3. set_essence(message_id) — 设精华
4. remove_essence(message_id) — 取消精华
5. react_emoji(message_id, emoji_id) — 表情反应（点赞=128077, 笑哭=128514, 心=10084）
6. send_message(text) — 发送消息到当前聊天
7. mute_user(user_id, duration) — 禁言(秒), 0=解除
8. kick_user(user_id) — 踢出群聊

## 规则
- 你需要根据上下文回答时，先调用 query_history 获取历史消息
- 消息ID必须从 query_history 的返回结果中提取，不要编造
- 一个回复可连续调用多个工具
- 中文回复，简洁短句
- 不要用 [CQ:xxx] 格式
- 你的昵称是「芙莉莲」，不要自称AI或群聊助手
'''

[llm.prompts]
enabled = true
prompts_dir = "prompts"
profile = "default"

[logging]
level = "INFO"
file = "logs/bot.log"
rotation = "10 MB"
retention = "14 days"
[artifacts]
enabled = true
root_dir = "data/artifacts"
max_file_size = 104857600
download_timeout = 60
auto_materialize = false

[history]
enabled = true
sync_on_connect = true
recent_contact_count = 50
page_size = 20
max_pages_per_sync = 3
query_backfill = true

[tools]
default_timeout = 30.0
invocation_persist = true
max_result_bytes = 262144

[runtime]
enabled = true
recover_on_start = true

[scheduler]
enabled = true
timezone = "Asia/Shanghai"
poll_interval = 1.0
max_catch_up = 10

[workspace]
enabled = true
root_dir = "data/workspace"
max_file_size = 1048576
max_read_size = 524288

[web]
enabled = true
timeout = 20.0
max_response_bytes = 2097152
max_redirects = 3
search_url = "https://html.duckduckgo.com/html/?q={query}"
user_agent = "qqbot-agent/1.0"
